<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Posição na Fila - Odontologia Japeri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .result-card {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }

        .result-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .result-summary {
            background: #eef2ff;
            border-left: 4px solid #667eea;
            color: #3730a3;
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: 700;
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .result-list {
            display: grid;
            gap: 20px;
        }

        .patient-result {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        .patient-result + .patient-result {
            margin-top: 4px;
        }

        .patient-result-title {
            color: #333;
            font-size: 1.15em;
            font-weight: 800;
            margin-bottom: 14px;
            text-align: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .position-badge {
            display: inline-block;
            font-size: 4em;
            font-weight: 900;
            color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .position-label {
            display: block;
            color: #666;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .info-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-aguardando {
            background: #fff3cd;
            color: #856404;
        }

        .status-agendado {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-atendido {
            background: #d4edda;
            color: #155724;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #dc3545;
            display: none;
            margin-top: 20px;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px;
            }

            h1 {
                font-size: 1.5em;
            }

            .position-badge {
                font-size: 3em;
            }

            .patient-result {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔍 Consultar Posição na Fila</h1>
            <p class="subtitle">Digite seu CPF para verificar sua posição na fila de espera</p>

            <div class="search-box">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                <button class="btn" onclick="consultarFila()">Consultar</button>
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Voltar</button>
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <button onclick="mostrarDuvidasDocumentos()" style="background: #6c757d; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 0.95em; transition: all 0.3s;" onmouseover="this.style.background='#5a6268'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='#6c757d'; this.style.transform='translateY(0)'">
                    📄 Dúvidas sobre Documentos?
                </button>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="result-card" id="resultCard">
                <div class="result-summary" id="resultSummary"></div>
                <div class="result-list" id="resultList"></div>
                <button class="btn" onclick="limparConsulta()" style="margin-top: 20px;">Nova Consulta</button>
            </div>
        </div>

        <a href="index.html" class="back-link">← Voltar para a página inicial</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://uakhmgoxgyklggsvtwdf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVha2htZ294Z3lrbGdnc3Z0d2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ1OTE0NzcsImV4cCI6MjA3OTk1MTQ3N30.6iCUHePtVlmq8De9oBl4Zw5CBU4Zai7P3xLpi7cYkDo';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6, 9)}-${value.slice(9)}`;
            } else if (value.length > 6) {
                value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6)}`;
            } else if (value.length > 3) {
                value = `${value.slice(0, 3)}.${value.slice(3)}`;
            }
            
            e.target.value = value;
        });

        // Permitir consulta ao pressionar Enter
        document.getElementById('cpf').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                consultarFila();
            }
        });

        // Função para validar CPF
        function validarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            
            // Verifica apenas se tem 11 dígitos
            if (cpf.length !== 11) return false;
            
            // Rejeitar CPFs com todos os dígitos iguais (ex: 111.111.111-11)
            if (/^(\d)\1{10}$/.test(cpf)) return false;
            
            // Aceita qualquer CPF com 11 dígitos (permite CPFs inválidos importados do CSV)
            return true;
        }

        async function buscarPacientesPorCpf(cpf) {
            const consultas = await Promise.all([
                supabaseClient
                    .from('pacientes')
                    .select('*')
                    .eq('cpf', cpf),
                supabaseClient
                    .from('gestantes')
                    .select('*')
                    .eq('cpf', cpf),
                supabaseClient
                    .from('pacientes_pediatria')
                    .select('*')
                    .eq('cpf', cpf)
            ]);

            const [consultaGeral, consultaGestantes, consultaPediatria] = consultas;

            if (consultaGeral.error) throw consultaGeral.error;
            if (consultaGestantes.error) throw consultaGestantes.error;
            if (consultaPediatria.error) throw consultaPediatria.error;

            const resultados = [];

            (consultaGeral.data || []).forEach((paciente, indice) => {
                resultados.push({ ...paciente, tipoCadastro: 'Fila Geral', ordemResultado: indice + 1 });
            });

            (consultaGestantes.data || []).forEach((gestante, indice) => {
                resultados.push({ ...gestante, tipoCadastro: 'Gestante', ordemResultado: indice + 1 });
            });

            (consultaPediatria.data || []).forEach((paciente, indice) => {
                resultados.push({ ...paciente, tipoCadastro: 'Odontopediatria', ordemResultado: indice + 1 });
            });

            return resultados;
        }

        function escaparHtml(valor) {
            return String(valor ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatarStatus(status) {
            const statusNormalizado = status || 'aguardando';
            return statusNormalizado.charAt(0).toUpperCase() + statusNormalizado.slice(1);
        }

        function obterMesReferencia(data) {
            return data.mes_referencia || (data.submitted_at ? data.submitted_at.slice(0, 7) : '');
        }

        function obterUnidade(data) {
            if (data.unidade_preferencia) return data.unidade_preferencia;
            if (data.tipoCadastro === 'Odontopediatria') return 'Odontopediatria';
            if (data.tipoCadastro === 'Gestante') return 'Atendimento prioritário para gestantes';
            return 'Não informada';
        }

        function montarResultadoPaciente(data, indice, total) {
            const status = data.status || 'aguardando';
            const mesReferencia = obterMesReferencia(data);
            const tituloResultado = total > 1 ? `Cadastro ${indice + 1} de ${total}` : 'Cadastro encontrado';
            const dataAgendamentoHtml = data.data_agendamento ? `
                <div class="info-item">
                    <div class="info-label">Data de Agendamento</div>
                    <div class="info-value">${escaparHtml(formatarData(data.data_agendamento))}</div>
                </div>
            ` : '';
            const responsavelHtml = data.nome_mae ? `
                <div class="info-item">
                    <div class="info-label">Mãe/Responsável</div>
                    <div class="info-value">${escaparHtml(data.nome_mae)}</div>
                </div>
            ` : '';

            return `
                <div class="patient-result">
                    <div class="patient-result-title">${escaparHtml(tituloResultado)} — ${escaparHtml(data.tipoCadastro || 'Fila Geral')}</div>
                    <div class="result-header">
                        <div class="position-badge">${escaparHtml(data.posicao_fila || '-')}</div>
                        <span class="position-label">Posição na Fila</span>
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Nome</div>
                            <div class="info-value">${escaparHtml(data.nome_completo || '-')}</div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">Tipo de Cadastro</div>
                            <div class="info-value">${escaparHtml(data.tipoCadastro || 'Fila Geral')}</div>
                        </div>

                        ${responsavelHtml}

                        <div class="info-item">
                            <div class="info-label">Unidade de Preferência</div>
                            <div class="info-value">${escaparHtml(obterUnidade(data))}</div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">Status</div>
                            <div class="info-value">
                                <span class="status-badge status-${escaparHtml(status)}">${escaparHtml(formatarStatus(status))}</span>
                            </div>
                        </div>

                        ${dataAgendamentoHtml}

                        <div class="info-item">
                            <div class="info-label">Mês de Referência</div>
                            <div class="info-value">${mesReferencia ? escaparHtml(formatarMes(mesReferencia)) : '-'}</div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">Celular de Contato</div>
                            <div class="info-value">${escaparHtml(formatarCelular(data.celular || ''))}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function exibirResultados(resultados) {
            const resultSummary = document.getElementById('resultSummary');
            const resultList = document.getElementById('resultList');
            const resultCard = document.getElementById('resultCard');
            const total = resultados.length;

            resultSummary.textContent = total === 1
                ? 'Encontramos 1 cadastro para este CPF.'
                : `Encontramos ${total} cadastros para este CPF. Todos estão listados abaixo, incluindo fila geral, gestante e odontopediatria quando houver.`;

            resultList.innerHTML = resultados
                .map((data, indice) => montarResultadoPaciente(data, indice, total))
                .join('');

            resultCard.classList.add('show');
        }

        // Função para consultar fila
        async function consultarFila() {
            const cpfInput = document.getElementById('cpf');
            const cpf = cpfInput.value.replace(/\D/g, '');
            const errorMessage = document.getElementById('errorMessage');
            const resultCard = document.getElementById('resultCard');

            // Limpar mensagens anteriores
            errorMessage.classList.remove('show');
            resultCard.classList.remove('show');

            // Validar CPF
            if (!validarCPF(cpf)) {
                errorMessage.textContent = '❌ CPF inválido. Por favor, verifique e tente novamente.';
                errorMessage.classList.add('show');
                return;
            }

            try {
                const resultados = await buscarPacientesPorCpf(cpf);

                if (!resultados.length) {
                    errorMessage.textContent = '❌ CPF não encontrado. Você ainda não está cadastrado na fila geral, gestantes ou odontopediatria.';
                    errorMessage.classList.add('show');
                    return;
                }

                exibirResultados(resultados);

            } catch (error) {
                console.error('Erro:', error);
                errorMessage.textContent = '❌ Erro ao consultar: ' + (error.message || 'tente novamente mais tarde.');
                errorMessage.classList.add('show');
            }
        }

        // Função para limpar consulta
        function limparConsulta() {
            document.getElementById('cpf').value = '';
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('cpf').focus();
        }

        // Função para formatar celular
        function formatarCelular(celular) {
            if (!celular) return '-';
            celular = celular.replace(/\D/g, '');
            return `(${celular.slice(0, 2)}) ${celular.slice(2, 7)}-${celular.slice(7)}`;
        }

        // Função para formatar data
        function formatarData(data) {
            if (!data) return '-';
            const d = new Date(data);
            const dataFormatada = d.toLocaleDateString('pt-BR');
            const horaFormatada = d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
            return `${dataFormatada} às ${horaFormatada}`;
        }

        // Função para formatar mês
        function formatarMes(mes) {
            if (!mes) return '-';
            const [ano, mesNum] = mes.split('-');
            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                          'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            return `${meses[parseInt(mesNum) - 1]} de ${ano}`;
        }


        // Focar no campo CPF ao carregar
        document.getElementById('cpf').focus();
    </script>
  <script src="modal-documentos.js?v=2"></script>
  <!-- Pop-up de Avaliação -->
  <script>
    fetch("avaliacao-popup.html")
      .then(response => {
        if (!response.ok) throw new Error('Erro ao carregar pop-up');
        return response.text();
      })
      .then(html => {
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = html;
        while (tempDiv.firstChild) {
          document.body.appendChild(tempDiv.firstChild);
        }
      })
      .catch(error => console.error('Erro ao carregar pop-up de avaliação:', error));
  </script>
    <script>

        // Registrar acesso à página no Supabase
        async function registrarAcesso() {
            try {
                const SUPABASE_URL = "https://uakhmgoxgyklggsvtwdf.supabase.co";
                const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVha2htZ294Z3lrbGdnc3Z0d2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ1OTE0NzcsImV4cCI6MjA3OTk1MTQ3N30.6iCUHePtVlmq8De9oBl4Zw5CBU4Zai7P3xLpi7cYkDo";
                
                if (typeof supabase === "undefined") {
                    const script = document.createElement("script");
                    script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
                    script.onload = () => {
                        const { createClient } = supabase;
                        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        enviarRastreamento(client);
                    };
                    document.head.appendChild(script);
                } else {
                    const { createClient } = supabase;
                    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    enviarRastreamento(client);
                }
            } catch (e) {
                console.log("Rastreamento:", e.message);
            }
        }
        
        function enviarRastreamento(client) {
            try {
                const paginaAtual = window.location.pathname.split("/").pop() || "index.html";
                const referrer = document.referrer || "direto";
                const userAgent = navigator.userAgent;
                client.rpc("registrar_acesso", {
                    p_pagina: paginaAtual,
                    p_referrer: referrer,
                    p_user_agent: userAgent
                }).catch(e => console.log("Erro:", e.message));
            } catch (e) {
                console.log("Rastreamento:", e.message);
            }
        }
        
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", registrarAcesso);
        } else {
            registrarAcesso();
        }
    
    </script>
</body>
</html>
